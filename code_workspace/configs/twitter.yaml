# ============================================================================
#  Twitter config v3 — FIXED.
#
#  KEY CHANGES FROM v2
#  ───────────────────
#  • topic_dim: 20 → 15 (twitter 25k docs, 5000 vocab — 20 topics too many)
#  • coh weight: 4.0 → 2.0 (was over-driving; with new quadratic loss,
#                           2.0 is plenty)
#  • div weight: 2.0 → 0.5 (new KL-based diversity is already strong)
#  • red weight: 3.0 → 1.0 (redundancy complements diversity; smaller now)
#  • LR: 0.0001 → 0.0005 (higher because losses are now well-conditioned)
#  • epochs: 100 → 80 (faster with better init)
#  • kl_warmup: 40 → 30 (new decoder is warm-started, so shorter warmup)
#  • kl weight: 0.02 → 0.05 (slightly higher now that it's stable)
# ============================================================================

dataset:
  name: twitter
  input_file: "/kaggle/input/datasets/pankaj078/topic-model-dt/tweets_dataset.txt"
  glove_path: "/kaggle/input/datasets/pankaj078/word-p/glove.6B.100d.txt"
  work_dir:   "/kaggle/working/twitter"

preprocessing:
  min_word_len:      3
  min_doc_len:       3
  min_word_count:    5
  max_word_freq:     0.70
  max_vocab:         5000
  bigram_min_count:  10
  bigram_threshold:  15.0
  use_trigrams:      true
  trigram_threshold: 12.0
  keep_verbs:        false
  ref_window_size:   10

model:
  embed_dim:        100
  hidden_dim:       256
  topic_dim:        15
  dropout:          0.20
  poincare_c:       1.0
  poincare_scale:   0.05
  fisher_rao_lam:   0.05
  routing_iters:    3
  routing_momentum: 0.90
  scad_rank:        20
  sinkhorn_iters:   8

training:
  batch_size:       128
  epochs:           80
  lr:               0.0005
  weight_decay:     0.00001
  grad_clip:        1.0
  temp_start:       1.00
  temp_end:         0.50
  kl_warmup_epoch:  30

loss_weights:
  recon:  1.0
  kl:     0.05
  coh:    2.0
  div:    0.5
  red:    1.0

evaluation:
  top_n_words:      10
  gate_min_npmi:    0.25
  gate_min_cv:      0.45
  gate_max_jaccard: 0.30
  gate_min_topics:  8

seed: 42
