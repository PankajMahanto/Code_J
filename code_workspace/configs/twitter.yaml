# ============================================================================
#  Twitter config v4 — Contextual Topic Model.
#
#  KEY CHANGES FROM v3
#  ───────────────────
#  • GloVe replaced with sentence-transformers (all-MiniLM-L6-v2, 384-d).
#  • embed_dim raised 100 → 384 to match the contextual encoder dim.
#  • kl_warmup_epoch tightened 30 → 20 (the linear KL anneal in the trainer
#    targets exactly this length: β ramps 0.0 → 1.0 over 20 epochs).
#  • Aggressive vocab filtering — min_word_count 5 → 10, max_word_freq
#    0.70 → 0.50 — drives U_Mass into the [-1, -0.5] target band.
#  • Loss weights: ortho=1.0 added (orthogonal regularisation on the
#    decoder's topic weight matrix; mandatory for Inter-cosine ≤ 0.30 and
#    Intra ∈ [0.85, 0.95]).  div + red lifted in step.
#  • Quality-gate thresholds raised to match Q1 journal targets.
# ============================================================================

dataset:
  name: twitter
  input_file: "/kaggle/input/datasets/pankaj078/topic-model-dt/tweets_dataset.txt"
  work_dir:   "/kaggle/working/twitter"
  # glove_path: deprecated — sentence-transformers used instead.

preprocessing:
  min_word_len:      3
  min_doc_len:       3
  min_word_count:    10        # was 5 — aggressive rare-word filter
  max_word_freq:     0.50      # was 0.70 — aggressive frequent-word filter
  max_vocab:         5000
  bigram_min_count:  10
  bigram_threshold:  15.0
  use_trigrams:      true
  trigram_threshold: 12.0
  keep_verbs:        false
  ref_window_size:   10

model:
  contextual_model: "sentence-transformers/all-MiniLM-L6-v2"
  embed_dim:        384        # = contextual dim (auto-aligned in trainer)
  hidden_dim:       256
  topic_dim:        15
  dropout:          0.20
  poincare_c:       1.0
  poincare_scale:   0.05
  fisher_rao_lam:   0.05
  routing_iters:    3
  routing_momentum: 0.90
  scad_rank:        20
  sinkhorn_iters:   8

training:
  batch_size:       128
  epochs:           80
  lr:               0.0005
  weight_decay:     0.00001
  grad_clip:        1.0        # torch.nn.utils.clip_grad_norm_(.., max_norm=1.0)
  temp_start:       1.00
  temp_end:         0.50
  kl_warmup_epoch:  20         # linear KL anneal 0 → 1 over 20 epochs

loss_weights:
  recon:  1.0
  kl:     0.05
  coh:    2.0
  div:    1.0
  red:    1.0
  ortho:  1.0                  # orthogonal regularisation on decoder weights

evaluation:
  top_n_words:      10
  gate_min_npmi:    0.50       # raised to match Q1 NPMI ≥ 0.76 target
  gate_min_cv:      0.80       # raised to match Q1 C_V ≥ 0.85-0.95 target
  gate_max_jaccard: 0.30
  gate_min_topics:  8

seed: 42
